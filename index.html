<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #161618;
    --border: #2a2a2e;
    --accent: #c8ff00;
    --accent2: #00d4ff;
    --text: #e8e8e8;
    --muted: #666;
    --bar-h: 52px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow: hidden;
  }

  /* ── Top Bar ── */
  #bar {
    height: var(--bar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 12px;
    position: relative;
    z-index: 10;
  }

  /* Nav buttons */
  .nav-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 8px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all .15s;
    flex-shrink: 0;
  }
  .nav-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
  .nav-btn:disabled { opacity: .3; cursor: default; }

  /* URL bar */
  #url-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px;
    gap: 8px;
    height: 36px;
    transition: border-color .2s;
  }
  #url-wrap:focus-within { border-color: var(--accent); }

  #lock {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
  }
  #lock.secure { color: #4caf50; }

  #url {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    min-width: 0;
  }
  #url::placeholder { color: var(--muted); }

  #go-btn {
    width: 28px; height: 28px;
    border: none;
    background: var(--accent);
    color: #000;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    flex-shrink: 0;
  }
  #go-btn:hover { background: #d4ff1a; transform: scale(1.05); }

  /* Loading bar */
  #progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width .3s ease;
    border-radius: 0 2px 2px 0;
  }
  #progress.done { opacity: 0; transition: opacity .4s .2s; }

  /* ── Iframe ── */
  #frame-wrap {
    position: relative;
    height: calc(100vh - var(--bar-h));
  }

  iframe {
    width: 100%; height: 100%;
    border: none;
    background: #fff;
    display: block;
  }

  /* ── Loading overlay ── */
  #overlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s;
    z-index: 5;
  }
  #overlay.show { opacity: 1; pointer-events: all; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .load-text {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: .05em;
  }

  /* ── Home screen ── */
  #home {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    z-index: 4;
    background: var(--bg);
  }
  #home.hidden { display: none; }

  .home-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 42px;
    letter-spacing: -.02em;
    color: var(--text);
  }
  .home-logo span { color: var(--accent); }

  .home-sub {
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .quick-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 400px;
  }

  .ql {
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    font-family: 'DM Mono', monospace;
  }
  .ql:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,255,0,.05);
  }
</style>
</head>
<body>

<div id="bar">
  <button class="nav-btn" id="btn-back" disabled title="Back">&#8592;</button>
  <button class="nav-btn" id="btn-fwd"  disabled title="Forward">&#8594;</button>
  <button class="nav-btn" id="btn-reload" title="Reload">&#8635;</button>

  <div id="url-wrap">
    <span id="lock">🔒</span>
    <input id="url" type="text" placeholder="Masukkan URL..." autocomplete="off" spellcheck="false">
    <button id="go-btn">&#9654;</button>
  </div>

  <div id="progress"></div>
</div>

<div id="frame-wrap">
  <!-- Home screen -->
  <div id="home">
    <div class="home-logo">priv<span>.</span>browser</div>
    <div class="home-sub">private · lightweight · yours</div>
    <div class="quick-links">
      <div class="ql" onclick="navigate('https://google.com')">Google</div>
      <div class="ql" onclick="navigate('https://youtube.com')">YouTube</div>
      <div class="ql" onclick="navigate('https://wikipedia.org')">Wikipedia</div>
      <div class="ql" onclick="navigate('https://reddit.com')">Reddit</div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="overlay">
    <div class="spinner"></div>
    <div class="load-text" id="load-txt">memuat...</div>
  </div>

  <iframe id="frame"></iframe>
</div>

<script>
  const frame   = document.getElementById('frame');
  const urlInput= document.getElementById('url');
  const btnBack = document.getElementById('btn-back');
  const btnFwd  = document.getElementById('btn-fwd');
  const btnRel  = document.getElementById('btn-reload');
  const progress= document.getElementById('progress');
  const overlay = document.getElementById('overlay');
  const loadTxt = document.getElementById('load-txt');
  const lockEl  = document.getElementById('lock');
  const homeEl  = document.getElementById('home');

  let history_stack = [];
  let history_pos   = -1;
  let loading = false;

  // ── Progress bar ──────────────────────────────────────────────
  function startProgress() {
    progress.classList.remove('done');
    progress.style.width = '0%';
    setTimeout(() => progress.style.width = '40%', 50);
    setTimeout(() => progress.style.width = '70%', 400);
  }
  function endProgress() {
    progress.style.width = '100%';
    setTimeout(() => progress.classList.add('done'), 300);
    setTimeout(() => { progress.style.width = '0%'; progress.classList.remove('done'); }, 800);
  }

  // ── Navigate ──────────────────────────────────────────────────
  function navigate(rawUrl, pushHistory = true) {
    let url = rawUrl.trim();
    if (!url) return;

    // Tambah https:// jika tidak ada protokol
    if (!/^https?:\/\//i.test(url)) {
      // Kalau tampak seperti domain
      if (url.includes('.') && !url.includes(' ')) {
        url = 'https://' + url;
      } else {
        // Treat sebagai Google search
        url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
      }
    }

    const proxyUrl = '/api/proxy?url=' + encodeURIComponent(url);

    // Update history
    if (pushHistory) {
      history_stack = history_stack.slice(0, history_pos + 1);
      history_stack.push(url);
      history_pos = history_stack.length - 1;
    }

    updateNavButtons();
    updateLock(url);
    urlInput.value = url;
    homeEl.classList.add('hidden');

    // Show loading
    loading = true;
    overlay.classList.add('show');
    loadTxt.textContent = new URL(url).hostname || 'memuat...';
    startProgress();

    frame.src = proxyUrl;
  }

  // ── Update UI ─────────────────────────────────────────────────
  function updateNavButtons() {
    btnBack.disabled = history_pos <= 0;
    btnFwd.disabled  = history_pos >= history_stack.length - 1;
  }

  function updateLock(url) {
    if (url.startsWith('https://')) {
      lockEl.textContent = '🔒';
      lockEl.className = 'secure';
    } else {
      lockEl.textContent = '⚠️';
      lockEl.className = '';
    }
  }

  // ── Iframe load event ─────────────────────────────────────────
  frame.addEventListener('load', () => {
    loading = false;
    overlay.classList.remove('show');
    endProgress();
  });

  // ── Messages dari iframe ───────────────────────────────────────
  window.addEventListener('message', (e) => {
    const d = e.data;
    if (!d || typeof d !== 'object') return;

    if (d.t === 'goto' && d.u) {
      navigate(d.u);
    }
    if (d.t === 'nav' && d.u) {
      // Update URL bar tanpa reload (SPA navigation)
      urlInput.value = d.u;
      updateLock(d.u);
      history_stack = history_stack.slice(0, history_pos + 1);
      history_stack.push(d.u);
      history_pos = history_stack.length - 1;
      updateNavButtons();
    }
    if (d.t === 'post' && d.u) {
      // Handle form POST
      const proxyUrl = '/api/proxy?url=' + encodeURIComponent(d.u);
      fetch(proxyUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: d.d || ''
      })
      .then(r => r.text())
      .then(html => {
        const blob = new Blob([html], { type: 'text/html' });
        frame.src = URL.createObjectURL(blob);
        navigate(d.u);
      });
    }
  });

  // ── Controls ──────────────────────────────────────────────────
  btnBack.addEventListener('click', () => {
    if (history_pos > 0) {
      history_pos--;
      navigate(history_stack[history_pos], false);
    }
  });

  btnFwd.addEventListener('click', () => {
    if (history_pos < history_stack.length - 1) {
      history_pos++;
      navigate(history_stack[history_pos], false);
    }
  });

  btnRel.addEventListener('click', () => {
    if (history_stack[history_pos]) {
      navigate(history_stack[history_pos], false);
    }
  });

  // ── URL input ─────────────────────────────────────────────────
  urlInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') navigate(urlInput.value);
  });

  document.getElementById('go-btn').addEventListener('click', () => {
    navigate(urlInput.value);
  });

  urlInput.addEventListener('focus', () => urlInput.select());
</script>
</body>
</html>
