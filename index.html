<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #toolbar {
      display: flex;
      flex-direction: column;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
      padding: 8px 10px;
      gap: 6px;
    }
    #toolbar-nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #toolbar-search {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .nav-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 16px;
      cursor: pointer;
      padding: 5px 8px;
      border-radius: 6px;
      flex-shrink: 0;
    }
    .nav-btn:hover { background: #0f3460; color: #fff; }
    .nav-btn:disabled { color: #333; cursor: default; }
    #url-bar {
      flex: 1;
      min-width: 0;
      background: #0f3460;
      border: 1px solid #1a4a8a;
      border-radius: 20px;
      color: #fff;
      font-size: 14px;
      padding: 8px 14px;
      outline: none;
    }
    #url-bar:focus { border-color: #4a9eff; }
    #url-bar::placeholder { color: #555; font-size: 13px; }
    #go-btn {
      background: #4a9eff;
      border: none;
      border-radius: 20px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #status-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 12px;
      background: #12192e;
      font-size: 11px;
      color: #445;
      flex-shrink: 0;
    }
    #sdot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }
    #sdot.ok { background: #4caf50; }
    #sdot.loading { background: #f5a623; animation: pulse 1s infinite; }
    #sdot.error { background: #f44336; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.3} }
    #frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #browser-frame {
      width: 100%; height: 100%;
      border: none;
      background: #fff;
      display: none;
    }
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      padding: 20px;
    }
    #home h1 { font-size: 26px; color: #4a9eff; }
    .ql-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      max-width: 360px;
    }
    .ql {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 12px;
      color: #aaa;
      text-align: center;
      min-width: 70px;
    }
    .ql span { display: block; font-size: 20px; margin-bottom: 3px; }
    .ql:hover { border-color: #4a9eff; color: #fff; }
    #badge {
      display: flex; align-items: center; gap: 6px;
      background: #0d2a1a; border: 1px solid #1a5c30;
      border-radius: 20px; padding: 7px 14px;
      font-size: 12px; color: #4caf50;
    }
    #loading {
      display: none;
      position: absolute; inset: 0;
      background: #1a1a2ecc;
      align-items: center; justify-content: center;
      flex-direction: column; gap: 12px; z-index: 10;
    }
    #loading.show { display: flex; }
    .spin {
      width: 36px; height: 36px;
      border: 3px solid #0f3460;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="toolbar">
  <div id="toolbar-nav">
    <button class="nav-btn" id="btn-back" disabled>&#8592;</button>
    <button class="nav-btn" id="btn-fwd" disabled>&#8594;</button>
    <button class="nav-btn" id="btn-reload">&#8635;</button>
    <button class="nav-btn" id="btn-home">&#8962;</button>
  </div>
  <div id="toolbar-search">
    <input id="url-bar" type="text" placeholder="URL atau kata kunci..." autocomplete="off" spellcheck="false">
    <button id="go-btn">Go</button>
  </div>
</div>

<div id="status-bar">
  <div id="sdot"></div>
  <span id="stxt">Siap — koneksi aman lewat proxy</span>
</div>

<div id="frame-wrap">
  <div id="home">
    <h1>🔒 Browser Aman</h1>
    <div id="badge">🛡️ Traffic lewat proxy — tidak terlacak</div>
    <div class="ql-wrap">
      <div class="ql" onclick="go('https://google.com')"><span>🔍</span>Google</div>
      <div class="ql" onclick="go('https://youtube.com')"><span>▶️</span>YouTube</div>
      <div class="ql" onclick="go('https://github.com')"><span>💻</span>GitHub</div>
      <div class="ql" onclick="go('https://reddit.com')"><span>📰</span>Reddit</div>
      <div class="ql" onclick="go('https://wikipedia.org')"><span>📖</span>Wiki</div>
      <div class="ql" onclick="go('https://twitter.com')"><span>🐦</span>Twitter</div>
    </div>
  </div>
  <div id="loading"><div class="spin"></div><div id="ltxt" style="font-size:12px;color:#556"></div></div>
  <iframe id="browser-frame"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-top-navigation-by-user-activation">
  </iframe>
</div>

<script>
const urlBar  = document.getElementById('url-bar');
const frame   = document.getElementById('browser-frame');
const homeEl  = document.getElementById('home');
const loading = document.getElementById('loading');
const ltxt    = document.getElementById('ltxt');
const sdot    = document.getElementById('sdot');
const stxt    = document.getElementById('stxt');
const btnBack = document.getElementById('btn-back');
const btnFwd  = document.getElementById('btn-fwd');

let hist = [], hidx = -1, curUrl = '';

function setStatus(type, txt) {
  sdot.className = type;
  stxt.textContent = txt;
}

function proxyUrl(url) {
  return '/api/proxy?url=' + encodeURIComponent(url);
}

function resolveInput(s) {
  s = s.trim();
  if (!s) return null;
  if (/^https?:\/\//i.test(s)) return s;
  if (!s.includes(' ') && s.includes('.')) return 'https://' + s;
  return 'https://www.google.com/search?q=' + encodeURIComponent(s);
}

function updateNav() {
  btnBack.disabled = hidx <= 0;
  btnFwd.disabled  = hidx >= hist.length - 1;
}

function go(url, push = true) {
  if (!url) return;
  curUrl = url;
  urlBar.value = url;

  if (push) {
    hist = hist.slice(0, hidx + 1);
    hist.push(url);
    hidx = hist.length - 1;
  }
  updateNav();

  homeEl.style.display = 'none';
  frame.style.display  = 'none';
  loading.classList.add('show');
  ltxt.textContent = url;
  setStatus('loading', 'Memuat...');

  frame.src = proxyUrl(url);
}

frame.addEventListener('load', () => {
  loading.classList.remove('show');
  frame.style.display = 'block';
  setStatus('ok', 'Aman — traffic lewat proxy Vercel');
});

frame.addEventListener('error', () => {
  loading.classList.remove('show');
  frame.style.display = 'block';
  setStatus('error', 'Gagal memuat');
});

// Terima pesan dari halaman yang di-proxy
window.addEventListener('message', (e) => {
  if (!e.data) return;

  // Update URL bar
  if (e.data.t === 'nav' && e.data.u) {
    curUrl = e.data.u;
    urlBar.value = e.data.u;
    // Update history entry saat ini
    if (hidx >= 0) hist[hidx] = e.data.u;
  }

  // Navigasi baru dari dalam proxy (klik link)
  if (e.data.t === 'goto' && e.data.u) {
    go(e.data.u);
  }
});

document.getElementById('go-btn').addEventListener('click', () => {
  const url = resolveInput(urlBar.value);
  if (url) go(url);
});
urlBar.addEventListener('keydown', e => {
  if (e.key === 'Enter') { const url = resolveInput(urlBar.value); if (url) go(url); }
});
btnBack.addEventListener('click', () => {
  if (hidx > 0) { hidx--; go(hist[hidx], false); }
});
btnFwd.addEventListener('click', () => {
  if (hidx < hist.length - 1) { hidx++; go(hist[hidx], false); }
});
document.getElementById('btn-reload').addEventListener('click', () => {
  if (curUrl) go(curUrl, false);
});
document.getElementById('btn-home').addEventListener('click', () => {
  frame.src = 'about:blank';
  frame.style.display = 'none';
  loading.classList.remove('show');
  homeEl.style.display = 'flex';
  urlBar.value = '';
  curUrl = '';
  setStatus('', 'Siap — koneksi aman lewat proxy');
});

function go(url, push = true) {
  if (!url) return;
  curUrl = url;
  urlBar.value = url;
  if (push) {
    hist = hist.slice(0, hidx + 1);
    hist.push(url);
    hidx = hist.length - 1;
  }
  updateNav();
  homeEl.style.display = 'none';
  frame.style.display  = 'none';
  loading.classList.add('show');
  ltxt.textContent = url;
  setStatus('loading', 'Memuat...');
  frame.src = proxyUrl(url);
}
</script>
</body>
</html>
