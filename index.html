<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      width: 100%;
    }

    /* ── Toolbar ── */
    #toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }

    #toolbar-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    #toolbar-search {
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 1;
      min-width: 0;
      width: 100%;
    }

    .nav-btn {
      background: none;
      border: none;
      color: #aaa;
      font-size: 16px;
      cursor: pointer;
      padding: 5px 7px;
      border-radius: 6px;
      transition: background 0.2s, color 0.2s;
      line-height: 1;
      flex-shrink: 0;
    }
    .nav-btn:hover { background: #0f3460; color: #fff; }
    .nav-btn:disabled { color: #444; cursor: default; }
    .nav-btn:disabled:hover { background: none; }

    #url-bar {
      flex: 1;
      min-width: 0;
      background: #0f3460;
      border: 1px solid #1a4a8a;
      border-radius: 20px;
      color: #fff;
      font-size: 14px;
      padding: 8px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #url-bar:focus {
      border-color: #4a9eff;
      box-shadow: 0 0 0 3px rgba(74,158,255,0.15);
    }
    #url-bar::placeholder { color: #667; font-size: 13px; }

    #go-btn {
      background: #4a9eff;
      border: none;
      border-radius: 20px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 16px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    #go-btn:hover { background: #2a7edf; }

    /* ── Status bar ── */
    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 14px;
      background: #12192e;
      font-size: 11px;
      color: #556;
      flex-shrink: 0;
      min-height: 22px;
    }
    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }
    #status-dot.loading { background: #f5a623; animation: pulse 1s infinite; }
    #status-dot.ok { background: #4caf50; }
    #status-dot.error { background: #f44336; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── Frame area ── */
    #frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    #browser-frame {
      min-width: 100%;
      width: 100%; height: 100%;
      border: none;
      background: #fff;
    }

    /* ── Home page ── */
    #home {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 24px;
      padding: 20px;
    }

    #home h1 {
      font-size: 28px;
      font-weight: 700;
      color: #4a9eff;
      letter-spacing: 1px;
    }

    #home p {
      color: #556;
      font-size: 13px;
      text-align: center;
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 400px;
    }

    .ql {
      background: #16213e;
      border: 1px solid #0f3460;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 13px;
      color: #aaa;
      transition: all 0.2s;
      text-align: center;
      min-width: 80px;
    }
    .ql:hover { background: #0f3460; color: #fff; border-color: #4a9eff; }
    .ql span { display: block; font-size: 22px; margin-bottom: 4px; }

    #privacy-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #0d2a1a;
      border: 1px solid #1a5c30;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 12px;
      color: #4caf50;
    }

    /* ── Loading overlay ── */
    #loading-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: #1a1a2e;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      z-index: 10;
    }
    #loading-overlay.show { display: flex; }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #0f3460;
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-url {
      font-size: 12px;
      color: #556;
      max-width: 280px;
      text-align: center;
      word-break: break-all;
    }
  </style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <div id="toolbar-nav">
    <button class="nav-btn" id="btn-back" title="Back" disabled>&#8592;</button>
    <button class="nav-btn" id="btn-forward" title="Forward" disabled>&#8594;</button>
    <button class="nav-btn" id="btn-reload" title="Reload">&#8635;</button>
    <button class="nav-btn" id="btn-home" title="Home">&#8962;</button>
  </div>
  <div id="toolbar-search">
    <input id="url-bar" type="text" placeholder="URL atau kata kunci..." autocomplete="off" spellcheck="false">
    <button id="go-btn">Go</button>
  </div>
</div>

<!-- Status bar -->
<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">Siap — koneksi aman lewat proxy</span>
</div>

<!-- Frame area -->
<div id="frame-wrap">

  <!-- Home page -->
  <div id="home">
    <h1>🔒 Browser Aman</h1>
    <div id="privacy-badge">
      <span>🛡️</span> Semua traffic lewat proxy — tidak terlacak
    </div>
    <p>Ketik URL atau kata kunci di atas, lalu tekan Go atau Enter.</p>
    <div class="quick-links">
      <div class="ql" onclick="navigate('https://google.com')"><span>🔍</span>Google</div>
      <div class="ql" onclick="navigate('https://youtube.com')"><span>▶️</span>YouTube</div>
      <div class="ql" onclick="navigate('https://github.com')"><span>💻</span>GitHub</div>
      <div class="ql" onclick="navigate('https://reddit.com')"><span>📰</span>Reddit</div>
      <div class="ql" onclick="navigate('https://wikipedia.org')"><span>📖</span>Wiki</div>
      <div class="ql" onclick="navigate('https://twitter.com')"><span>🐦</span>Twitter</div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="loading-url">Memuat...</div>
  </div>

  <!-- Browser iframe -->
  <iframe id="browser-frame" style="display:none;" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"></iframe>

</div>

<script>
  const urlBar    = document.getElementById('url-bar');
  const frame     = document.getElementById('browser-frame');
  const home      = document.getElementById('home');
  const loading   = document.getElementById('loading-overlay');
  const loadingUrl= document.getElementById('loading-url');
  const statusDot = document.getElementById('status-dot');
  const statusTxt = document.getElementById('status-text');
  const btnBack   = document.getElementById('btn-back');
  const btnFwd    = document.getElementById('btn-forward');

  // History stack
  let history = [];
  let historyIdx = -1;
  let currentUrl = '';

  function setStatus(type, text) {
    statusDot.className = type;
    statusTxt.textContent = text;
  }

  function toProxyUrl(url) {
    return '/api/proxy?url=' + encodeURIComponent(url);
  }

  function resolveInput(input) {
    input = input.trim();
    if (!input) return null;
    // If it looks like a URL
    if (/^https?:\/\//i.test(input)) return input;
    // If it has a dot and no spaces — treat as domain
    if (!input.includes(' ') && input.includes('.')) return 'https://' + input;
    // Otherwise search Google
    return 'https://www.google.com/search?q=' + encodeURIComponent(input);
  }

  function updateNavButtons() {
    btnBack.disabled  = historyIdx <= 0;
    btnFwd.disabled   = historyIdx >= history.length - 1;
  }

  function navigate(url, pushHistory = true) {
    if (!url) return;

    currentUrl = url;
    urlBar.value = url;

    // Update history
    if (pushHistory) {
      history = history.slice(0, historyIdx + 1);
      history.push(url);
      historyIdx = history.length - 1;
    }
    updateNavButtons();

    // Show loading
    home.style.display = 'none';
    frame.style.display = 'none';
    loading.classList.add('show');
    loadingUrl.textContent = url;
    setStatus('loading', 'Memuat lewat proxy...');

    const proxyUrl = toProxyUrl(url);
    frame.src = proxyUrl;
  }

  // Frame events
  frame.addEventListener('load', () => {
    loading.classList.remove('show');
    frame.style.display = 'block';
    setStatus('ok', 'Aman — traffic lewat proxy Vercel');

    // Try to get current URL from frame (may fail due to cross-origin)
    try {
      const frameSrc = frame.src;
      if (frameSrc && frameSrc.includes('/api/proxy?url=')) {
        const inner = decodeURIComponent(frameSrc.split('?url=')[1]);
        urlBar.value = inner;
        currentUrl = inner;
      }
    } catch {}
  });

  frame.addEventListener('error', () => {
    loading.classList.remove('show');
    frame.style.display = 'block';
    setStatus('error', 'Gagal memuat halaman');
  });

  // Go button
  document.getElementById('go-btn').addEventListener('click', () => {
    const url = resolveInput(urlBar.value);
    if (url) navigate(url);
  });

  // Enter key
  urlBar.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const url = resolveInput(urlBar.value);
      if (url) navigate(url);
    }
  });

  // Back / Forward
  btnBack.addEventListener('click', () => {
    if (historyIdx > 0) {
      historyIdx--;
      navigate(history[historyIdx], false);
    }
  });

  btnFwd.addEventListener('click', () => {
    if (historyIdx < history.length - 1) {
      historyIdx++;
      navigate(history[historyIdx], false);
    }
  });

  // Reload
  document.getElementById('btn-reload').addEventListener('click', () => {
    if (currentUrl) navigate(currentUrl, false);
  });

  // Home
  document.getElementById('btn-home').addEventListener('click', () => {
    frame.src = 'about:blank';
    frame.style.display = 'none';
    loading.classList.remove('show');
    home.style.display = 'flex';
    urlBar.value = '';
    currentUrl = '';
    setStatus('', 'Siap — koneksi aman lewat proxy');
  });
  // Listen URL update from iframe
  window.addEventListener('message',(e)=>{
    if(e.data&&e.data.t==='nav'&&e.data.u){urlBar.value=e.data.u;currentUrl=e.data.u;}
  });
</script>
</body>
</html>
