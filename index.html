<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navigator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1c1c1e;
    --bar: #2c2c2e;
    --border: #3a3a3c;
    --input-bg: #1c1c1e;
    --accent: #0a84ff;
    --text: #f2f2f7;
    --muted: #8e8e93;
    --bar-h: 48px;
  }

  html, body { height: 100%; background: var(--bg); overflow: hidden; }

  /* ── Toolbar ── */
  #toolbar {
    height: var(--bar-h);
    background: var(--bar);
    display: flex;
    align-items: center;
    padding: 0 8px;
    gap: 6px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .tb-btn {
    width: 30px; height: 30px;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    transition: background .1s, color .1s;
    flex-shrink: 0;
  }
  .tb-btn:hover:not(:disabled) { background: var(--border); color: var(--text); }
  .tb-btn:disabled { opacity: .35; cursor: default; }
  .tb-btn svg { width: 16px; height: 16px; fill: currentColor; }

  /* URL bar */
  #urlbar {
    flex: 1;
    display: flex;
    align-items: center;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    height: 32px;
    padding: 0 10px;
    gap: 6px;
  }
  #urlbar:focus-within { border-color: var(--accent); }

  #lock-icon {
    color: var(--muted);
    font-size: 11px;
    flex-shrink: 0;
    line-height: 1;
  }
  #lock-icon.ok { color: #32d74b; }
  #lock-icon.warn { color: #ff9f0a; }

  #urlinput {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 13px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    min-width: 0;
  }
  #urlinput::placeholder { color: var(--muted); }

  /* Progress bar */
  #prog {
    position: absolute;
    bottom: 0; left: 0;
    height: 2px;
    width: 0;
    background: var(--accent);
    transition: width .25s ease, opacity .3s;
    pointer-events: none;
  }

  /* ── Content area ── */
  #content {
    position: relative;
    height: calc(100vh - var(--bar-h));
    width: 100%;
  }

  iframe {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    border: none;
    background: #fff;
  }

  /* ── New tab page ── */
  #newtab {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    z-index: 2;
  }
  #newtab.hidden { display: none; }

  #newtab-time {
    font-size: 52px;
    font-weight: 200;
    color: var(--text);
    letter-spacing: -2px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #newtab-date {
    font-size: 14px;
    color: var(--muted);
    margin-top: -16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  #newtab-search {
    display: flex;
    align-items: center;
    background: var(--bar);
    border: 1px solid var(--border);
    border-radius: 24px;
    height: 44px;
    width: min(480px, 90vw);
    padding: 0 16px;
    gap: 10px;
    transition: border-color .2s;
  }
  #newtab-search:focus-within { border-color: var(--accent); }
  #newtab-search svg { width: 16px; height: 16px; fill: var(--muted); flex-shrink: 0; }

  #newtab-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  #newtab-input::placeholder { color: var(--muted); }
</style>
</head>
<body>

<div id="toolbar">
  <button class="tb-btn" id="btn-back" disabled title="Back">
    <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <button class="tb-btn" id="btn-fwd" disabled title="Forward">
    <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
  <button class="tb-btn" id="btn-reload" title="Reload">
    <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
  </button>

  <div id="urlbar">
    <span id="lock-icon">🔒</span>
    <input id="urlinput" type="text" placeholder="Search or enter address" autocomplete="off" spellcheck="false">
  </div>

  <div id="prog"></div>
</div>

<div id="content">
  <div id="newtab">
    <div id="newtab-time">00:00</div>
    <div id="newtab-date">Loading...</div>
    <div id="newtab-search">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input id="newtab-input" type="text" placeholder="Search the web..." autocomplete="off" spellcheck="false">
    </div>
  </div>

  <iframe id="frame"></iframe>
</div>

<script>
  const frame     = document.getElementById('frame');
  const urlinput  = document.getElementById('urlinput');
  const btnBack   = document.getElementById('btn-back');
  const btnFwd    = document.getElementById('btn-fwd');
  const btnReload = document.getElementById('btn-reload');
  const prog      = document.getElementById('prog');
  const lockEl    = document.getElementById('lock-icon');
  const newtab    = document.getElementById('newtab');
  const ntInput   = document.getElementById('newtab-input');

  let stack = [], pos = -1;

  // ── Clock ─────────────────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    document.getElementById('newtab-time').textContent = `${h}:${m}`;
    document.getElementById('newtab-date').textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── Progress ──────────────────────────────────────────────────
  function progStart() {
    prog.style.opacity = '1';
    prog.style.transition = 'width .25s ease';
    prog.style.width = '0';
    setTimeout(() => prog.style.width = '35%', 30);
    setTimeout(() => prog.style.width = '65%', 500);
  }
  function progEnd() {
    prog.style.width = '100%';
    setTimeout(() => { prog.style.opacity = '0'; prog.style.width = '0'; }, 400);
  }

  // ── Navigate ──────────────────────────────────────────────────
  function navigate(raw, push = true) {
    let url = raw.trim();
    if (!url) return;

    if (!/^https?:\/\//i.test(url)) {
      if (/^[\w-]+(\.[\w-]+)+/.test(url) && !url.includes(' ')) {
        url = 'https://' + url;
      } else {
        url = 'https://www.google.com/search?q=' + encodeURIComponent(url);
      }
    }

    if (push) {
      stack = stack.slice(0, pos + 1);
      stack.push(url);
      pos = stack.length - 1;
    }

    updateNav();
    setLock(url);
    urlinput.value = url;
    newtab.classList.add('hidden');
    progStart();
    frame.src = '/api/proxy?url=' + encodeURIComponent(url);
  }

  function updateNav() {
    btnBack.disabled = pos <= 0;
    btnFwd.disabled  = pos >= stack.length - 1;
  }

  function setLock(url) {
    if (url.startsWith('https://')) {
      lockEl.textContent = '🔒'; lockEl.className = 'ok';
    } else if (url.startsWith('http://')) {
      lockEl.textContent = '⚠️'; lockEl.className = 'warn';
    } else {
      lockEl.textContent = '🔒'; lockEl.className = '';
    }
  }

  // ── Events ────────────────────────────────────────────────────
  frame.addEventListener('load', progEnd);

  urlinput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(urlinput.value); });
  urlinput.addEventListener('focus', () => urlinput.select());

  ntInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(ntInput.value); });

  btnBack.addEventListener('click', () => { if (pos > 0) { pos--; navigate(stack[pos], false); } });
  btnFwd.addEventListener('click',  () => { if (pos < stack.length - 1) { pos++; navigate(stack[pos], false); } });
  btnReload.addEventListener('click', () => { if (stack[pos]) navigate(stack[pos], false); });

  // ── Messages from iframe ──────────────────────────────────────
  window.addEventListener('message', e => {
    const d = e.data;
    if (!d || typeof d !== 'object') return;

    if (d.t === 'goto' && d.u) {
      navigate(d.u);
    }
    if (d.t === 'nav' && d.u) {
      urlinput.value = d.u;
      setLock(d.u);
      stack = stack.slice(0, pos + 1);
      stack.push(d.u);
      pos = stack.length - 1;
      updateNav();
    }
    if (d.t === 'post' && d.u) {
      fetch('/api/proxy?url=' + encodeURIComponent(d.u), {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: d.d || ''
      }).then(r => r.text()).then(html => {
        const blob = new Blob([html], { type: 'text/html' });
        frame.src = URL.createObjectURL(blob);
        urlinput.value = d.u;
        setLock(d.u);
      });
    }
  });
</script>
</body>
</html>
